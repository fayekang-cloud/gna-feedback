/* ── utils ── */
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);

const IOC = {
  I: {

      { id: "I3", title: "가감 없이, 무례하지 않게", desc: "사실을 있는 그대로 전달하되, 상대방의 감정을 배려합니다." },
      { id: "I4", title: "솔직하게 한 걸음씩", desc: "정직한 마음가짐은 지속 가능한 성장의 토대가 됩니다." },
    ],
  },
  O: {
    ko: "오너십", en: "Ownership", color: "#0DE2E3", bg: "rgba(13,226,227,.12)",
    behaviors: [
      { id: "O1", title: "플레이오가 나의 자랑이 되도록", desc: "내가 하는 일의 영향력을 인지하며 최고의 결과물을 창출합니다." },

      { id: "O3", title: "모든 일은 나의 커리어", desc: "우리가 하는 모든 일은 자신을 성장시키고, 팀의 성과를 이끕니다." },
    ],
  },
  C: {
    ko: "용기", en: "Courage", color: "#FF6B8A", bg: "rgba(255,107,138,.12)",
    behaviors: [
      { id: "C1", title: "실패는 또 다른 시작점", desc: "도전을 멈추지 않고, 배가 침몰하지 않을 정도의 실패를 허용합니다." },

      { id: "C3", title: "변화의 시작은 해오던 일로부터", desc: "끊임없이 진화하며 더 나은 결과를 위해 다르게 시도합니다." },
    ],
  },
};

function getBeh(id) {
  if (!id) return null;
  for (const [k, v] of Object.entries(IOC)) {
    const b = v.behaviors.find(x => x.id === id);
    if (b) return { ...b, cat: k, color: v.color, bg: v.bg, ko: v.ko };
  }
  return null;
}

/* ── storage helper ── */
function sGet(key) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; } catch { return null; }
}
function sSet(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
}

/* ── Google Sheets sync ── */
async function gsSync(url, leader) {
  if (!url) return null;
  try {
    const r = await fetch(url + "?action=get&leader=" + encodeURIComponent(leader));
    if (!r.ok) return null;
    return await r.json();
  } catch { return null; }
}

async function gsPush(url, payload) {
  if (!url) return;
  try {
    await fetch(url, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: "data=" + encodeURIComponent(JSON.stringify(payload)),
    });
  } catch {}
}

/* ════════════════════════════════════════════════════════════════ */

function App() {
  const [settings, setSettings] = useState({ leaderName: "", scriptUrl: "" });
  const [members, setMembers] = useState([]);
  const [records, setRecords] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [tab, setTab] = useState("values");
  const [view, setView] = useState("list");
  const [selM, setSelM] = useState(null);
  const [compose, setCompose] = useState(false);
  const [toast, setToast] = useState("");

  /* ── load ── */
  useEffect(() => {
    (async () => {
      const s = sGet("playio-settings");
      const m = sGet("playio-members");
      const r = sGet("playio-records");
      if (s) setSettings(s);
      if (m) setMembers(m);
      if (r) setRecords(r);
      setLoaded(true);
    })();
  }, []);

  /* ── save ── */
  useEffect(() => { if (loaded) sSet("playio-settings", settings); }, [settings, loaded]);
  useEffect(() => { if (loaded) sSet("playio-members", members); }, [members, loaded]);
  useEffect(() => { if (loaded) sSet("playio-records", records); }, [records, loaded]);

  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(""), 2200); };

  /* ── Google Sheets sync ── */
  const syncToSheet = useCallback(async (newRec) => {
    if (!settings.scriptUrl) return;
    await gsPush(settings.scriptUrl, {
      action: "addRecord",
      leader: settings.leaderName,
      record: newRec,
    });
  }, [settings]);

  const syncFromSheet = useCallback(async () => {
    if (!settings.scriptUrl || !settings.leaderName) { showToast("스크립트 URL과 이름을 먼저 입력하세요"); return; }
    showToast("동기화 중...");
    const result = await gsSync(settings.scriptUrl, settings.leaderName);
    if (result?.records) {
      setRecords(prev => {
        const ids = new Set(prev.map(r => r.id));
        const merged = [...prev, ...result.records.filter(r => !ids.has(r.id))];
        return merged.sort((a, b) => b.date - a.date);
      });
      showToast("동기화 완료 ✓");
    } else {
      showToast("동기화 실패 — URL을 확인하세요");
    }
  }, [settings]);

  const pushAllToSheet = useCallback(async () => {
    if (!settings.scriptUrl) return;
    await gsPush(settings.scriptUrl, {
      action: "pushAll",
      leader: settings.leaderName,
      members,
      records,
    });
    showToast("시트에 전체 업로드 완료 ✓");
  }, [settings, members, records]);

  /* ── handlers ── */
  const addMember = (name, role) => {
    if (!name.trim()) return;
    const m = { id: uid(), name: name.trim(), role: role.trim(), initial: name.trim()[0] };
    setMembers(p => [...p, m]);
  };
  const removeMember = (id) => setMembers(p => p.filter(m => m.id !== id));

  const addRecord = (rec) => {
    setRecords(p => [rec, ...p]);
    syncToSheet(rec);
    showToast("저장됨 ✓");
  };

  const toggleAction = (rId, aId) => {
    setRecords(p => p.map(r => r.id === rId ? { ...r, actions: r.actions.map(a => a.id === aId ? { ...a, done: !a.done } : a) } : r));
  };

  const openM = (m) => { setSelM(m); setView("detail"); };
  const goList = () => { setView("list"); setSelM(null); };

  const getRecs = (mId) => records.filter(r => r.memberId === mId).sort((a, b) => b.date - a.date);
  const getStats = (mId) => {
    const recs = getRecs(mId);
    const cats = {};
    recs.forEach(r => { const b = getBeh(r.behaviorId); if (b) cats[b.cat] = (cats[b.cat]||0)+1; });
    return { total: recs.length, last: recs[0]?.date, cats };
  };

/* ═══ Dashboard ═══ */
function DashboardView({ members, records, fmt }) {
  const now = Date.now();
  const thisMonth = records.filter(r => {
    const d = new Date(r.date);
    const n = new Date();
    return d.getMonth() === n.getMonth() && d.getFullYear() === n.getFullYear();
  }).length;

  const iocCounts = { I: 0, O: 0, C: 0 };
  records.forEach(r => { const b = getBeh(r.behaviorId); if (b) iocCounts[b.cat]++; });
  const maxIoc = Math.max(...Object.values(iocCounts), 1);

  const completedActions = records.flatMap(r => (r.actions || []).filter(a => a.done)).length;
  const totalActions = records.flatMap(r => r.actions || []).length;

  // per-member stats
  const memberStats = members.map(m => {
    const recs = records.filter(r => r.memberId === m.id);
    const last = recs.sort((a, b) => b.date - a.date)[0]?.date;
    const daysSince = last ? Math.floor((now - last) / 86400e3) : null;
    return { ...m, count: recs.length, last, daysSince };
  }).sort((a, b) => (a.daysSince ?? 999) - (b.daysSince ?? 999));

  const needsAttention = memberStats.filter(m => m.daysSince === null || m.daysSince >= 14);

  const recentRecords = [...records].sort((a, b) => b.date - a.date).slice(0, 5);

  return (
    <div>
      {/* summary cards */}
      <div className="db-grid">
        <div className="db-card">
          <div className="db-card-v" style={{ color: "var(--b)" }}>{records.length}</div>
          <div className="db-card-l">전체 기록</div>
        </div>
        <div className="db-card">
          <div className="db-card-v" style={{ color: "var(--t)" }}>{thisMonth}</div>
          <div className="db-card-l">이번 달</div>
        </div>
        <div className="db-card">
          <div className="db-card-v" style={{ color: totalActions > 0 && completedActions === totalActions ? "var(--t)" : "var(--gd)" }}>
            {totalActions > 0 ? Math.round((completedActions / totalActions) * 100) + "%" : "—"}
          </div>
          <div className="db-card-l">액션 완료율</div>
        </div>
      </div>

      {/* alerts */}
      {needsAttention.length > 0 && (
        <div className="db-section">
          <div className="db-section-t">⚠️ 1on1 리마인드</div>
          {needsAttention.map(m => (
            <div className="db-alert" key={m.id}>
              <span style={{ fontWeight: 700 }}>{m.name}</span>
              <span>{m.daysSince === null ? "아직 1on1 기록 없음" : `${m.daysSince}일 전 마지막 진행`}</span>
            </div>
          ))}
        </div>
      )}

      {/* IOC distribution */}
      <div className="db-section">
        <div className="db-section-t">핵심가치 분포</div>
        {Object.entries(IOC).map(([k, v]) => (
          <div className="db-bar-row" key={k}>
            <div className="db-bar-label" style={{ color: v.color }}>{v.ko}</div>
            <div className="db-bar-track">
              <div className="db-bar-fill" style={{ width: `${(iocCounts[k] / maxIoc) * 100}%`, background: v.color }} />
            </div>
            <div className="db-bar-count">{iocCounts[k]}</div>
          </div>
        ))}
      </div>

      {/* per member */}
      <div className="db-section">
        <div className="db-section-t">팀원별 현황</div>
        {memberStats.length === 0 ? (
          <div className="empty"><b>👥</b><p>팀원을 추가하세요</p></div>
        ) : (
          memberStats.map(m => (
            <div className="db-member-row" key={m.id}>
              <div className="db-m-av">{m.initial}</div>
              <div className="db-m-name">{m.name}</div>
              <div className="db-m-cnt">{m.count}회</div>
              <div className="db-m-ago">{m.last ? (m.daysSince === 0 ? "오늘" : `${m.daysSince}일 전`) : "—"}</div>
            </div>
          ))
        )}
      </div>

      {/* recent */}
      <div className="db-section">
        <div className="db-section-t">최근 기록</div>
        {recentRecords.length === 0 ? (
          <div className="empty"><b>📝</b><p>기록이 없습니다</p></div>
        ) : (
          recentRecords.map(r => {
            const beh = getBeh(r.behaviorId);
            const member = members.find(m => m.id === r.memberId);
            return (
              <div className="db-recent" key={r.id}>
                <div className="db-recent-head">
                  <span className="rc-tag" style={{ background: "rgba(68,136,255,.12)", color: "var(--b)" }}>1:1</span>
                  <span style={{ fontSize: 12, fontWeight: 700, color: "var(--w9)" }}>{member?.name || "—"}</span>
                  <span className="rc-date">{fmt(r.date)}</span>
                  {beh && <span className="rc-tag" style={{ background: beh.bg, color: beh.color }}>{beh.ko}</span>}
                </div>
                <div className="db-recent-body">{r.agenda ? `${r.agenda} — ` : ""}{r.content}</div>
              </div>
            );
          })
        )}
      </div>
    </div>
  );
}

/* ═══ Member Detail ═══ */
function MemberDetail({ member, records, onBack, onToggle, fmt }) {
  const cats = { I: 0, O: 0, C: 0 };
  records.forEach(r => { const b = getBeh(r.behaviorId); if (b) cats[b.cat]++; });
  const pending = records.flatMap(r => (r.actions||[]).filter(a => !a.done));

  return (
    <div>
      <div className="md-top">
        <button className="md-back" onClick={onBack}>← 목록</button>
        <div className="md-prof">
          <div className="md-av">{member.initial}</div>
          <div><div className="md-name">{member.name}</div><div className="md-role">{member.role}</div></div>
        </div>
        <div className="md-stats">
          {Object.entries(IOC).map(([k, v]) => (
            <div className="md-stat" key={k} style={{ background: v.bg }}>
              <div className="md-stat-v" style={{ color: v.color }}>{cats[k]}</div>
              <div className="md-stat-l" style={{ color: v.color }}>{v.ko}</div>
            </div>
          ))}
        </div>
      </div>

      {pending.length > 0 && (
        <>
          <div className="sec-lbl">진행 중 액션 ({pending.length})</div>
          <div style={{ padding: "0 20px 4px" }}>
            {pending.map(a => {
              const rec = records.find(r => r.actions?.some(x => x.id === a.id));
              return (
                <div className="rc-act" key={a.id}>
                  <div className="rc-chk" onClick={() => rec && onToggle(rec.id, a.id)} />
                  <span className="rc-act-t">{a.text}</span>
                </div>
              );
            })}
          </div>
        </>
      )}

      <div className="sec-lbl">1:1 기록 ({records.length})</div>
      {records.length === 0 ? (
        <div className="empty"><b>💬</b><p>아직 기록이 없습니다.</p></div>
      ) : (
        records.map(r => <RecordCard key={r.id} rec={r} onToggle={(aId) => onToggle(r.id, aId)} fmt={fmt} />)
      )}
    </div>
  );
}

/* ═══ Record Card ═══ */
function RecordCard({ rec, onToggle, fmt }) {
  const [open, setOpen] = useState(false);
  const beh = getBeh(rec.behaviorId);

  return (
    <div className="rc">
      <div className="rc-head">
        <span className="rc-tag" style={{ background: "rgba(68,136,255,.12)", color: "var(--b)" }}>1:1</span>
        <span className="rc-date">{fmt(rec.date)}</span>
        {beh && <span className="rc-tag" style={{ background: beh.bg, color: beh.color }}>{beh.ko}</span>}
        <button className="rc-toggle" onClick={() => setOpen(!open)}>{open ? "접기" : "더보기"}</button>
      </div>
      {rec.agenda && <div className="rc-agenda">{rec.agenda}</div>}
      {beh && <div className="rc-beh" style={{ background: beh.bg, color: beh.color }}>{beh.title}</div>}
      <div className="rc-body">{rec.content}</div>
      {open && (
        <>
          {rec.memo && <div className="rc-memo"><div className="rc-memo-lbl">메모</div>{rec.memo}</div>}
          {rec.actions?.length > 0 && (
            <div><div className="rc-memo-lbl" style={{marginBottom:3}}>액션 아이템</div>
              {rec.actions.map(a => (
                <div className="rc-act" key={a.id}>
                  <div className={`rc-chk ${a.done?"done":""}`} onClick={() => onToggle(a.id)}>
                    {a.done && <svg width="8" height="6" viewBox="0 0 8 6" fill="none"><path d="M1 3l2 2 4-4" stroke="#fff" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                  </div>
                  <span className={`rc-act-t ${a.done?"done":""}`}>{a.text}</span>
                </div>
              ))}
            </div>
          )}
        </>
      )}
    </div>
  );
}

/* ═══ Compose ═══ */
function ComposeModal({ members, preselect, leaderName, onClose, onSave }) {
  const [memberId, setMemberId] = useState(preselect);
  const [selCat, setSelCat] = useState("");
  const [behaviorId, setBehaviorId] = useState("");
  const [agenda, setAgenda] = useState("");
  const [content, setContent] = useState("");
  const [memo, setMemo] = useState("");
  const [actions, setActions] = useState([]);
  const [actInput, setActInput] = useState("");

  const addAct = () => { if (!actInput.trim()) return; setActions(p => [...p, {id:uid(),text:actInput.trim(),done:false}]); setActInput(""); };

  return (
    <div className="ov" onClick={e => e.target===e.currentTarget && onClose()}>
      <div className="mo">
        <div className="mo-bar"/>
        <div className="mo-t">1:1 피드백 기록</div>

        <div className="fg">
          <label className="fl">팀원</label>
          <select className="inp" value={memberId} onChange={e => setMemberId(e.target.value)} style={{appearance:"none"}}>
            <option value="">선택</option>
            {members.map(m => <option key={m.id} value={m.id}>{m.name} · {m.role}</option>)}
          </select>
        </div>

        <div className="fg">
          <label className="fl">아젠다 <small>대화 주제</small></label>
          <input className="inp" placeholder="분기 목표 점검, 커리어 대화..." value={agenda} onChange={e => setAgenda(e.target.value)} />
        </div>

        <div className="fg">
          <label className="fl">핵심가치 연결 <small>어떤 행동양식이 드러났나요?</small></label>
          <div className="pill-r">
            {Object.entries(IOC).map(([k, v]) => (
              <button key={k} className={`pill ${selCat===k?"on":""}`}
                style={selCat===k ? {background:v.color,borderColor:v.color} : {color:v.color,borderColor:v.color+"44"}}
                onClick={() => {setSelCat(selCat===k?"":k);setBehaviorId("");}}>
                {v.ko}
              </button>
            ))}
          </div>
          {selCat && (
            <div className="beh-sel">
              {IOC[selCat].behaviors.map(b => (
                <div key={b.id} className={`beh-opt ${behaviorId===b.id?"on":""}`}
                  style={behaviorId===b.id ? {borderColor:IOC[selCat].color,background:IOC[selCat].bg} : {}}
                  onClick={() => setBehaviorId(behaviorId===b.id?"":b.id)}>
                  <div className="beh-opt-t" style={behaviorId===b.id?{color:IOC[selCat].color}:{color:"var(--w7)"}}>{b.title}</div>
                  <div className="beh-opt-d">{b.desc}</div>
                </div>
              ))}
            </div>
          )}
        </div>

        <div className="fg">
          <label className="fl">피드백 내용 <small>구체적인 상황·행동·영향을 담아주세요</small></label>
          <textarea className="inp ta" style={{minHeight:80}} placeholder="예: 이번 스프린트 회고에서 팀원이 먼저 리스크를 짚어줬고..." value={content} onChange={e => setContent(e.target.value)} />
        </div>

        <div className="fg">
          <label className="fl">메모 <small>대화 내용, 합의 사항</small></label>
          <textarea className="inp ta" placeholder="자유롭게 기록..." value={memo} onChange={e => setMemo(e.target.value)} />
        </div>

        <div className="fg">
          <label className="fl">액션 아이템</label>
          <div className="act-add">
            <input className="inp inp-sm" style={{flex:1}} placeholder="다음에 할 일..." value={actInput} onChange={e => setActInput(e.target.value)} onKeyDown={e => e.key==="Enter" && addAct()} />
            <button className="btn btn-sm btn-s" onClick={addAct}>추가</button>
          </div>
          {actions.length > 0 && <div className="act-list">{actions.map(a => (
            <div className="act-item" key={a.id}><span>• {a.text}</span><button className="act-rm" onClick={() => setActions(p => p.filter(x=>x.id!==a.id))}>✕</button></div>
          ))}</div>}
        </div>

        <div className="btn-r">
          <button className="btn btn-c" onClick={onClose}>취소</button>
          <button className="btn btn-s" disabled={!memberId || !content.trim()} onClick={() => {
            const m = members.find(x=>x.id===memberId);
            onSave({ id:uid(), memberId, memberName:m?.name||"", leader:leaderName, behaviorId, agenda, content:content.trim(), memo, actions, date:Date.now() });
          }}>저장</button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
